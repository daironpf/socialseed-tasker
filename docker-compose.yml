services:
  # =============================================================================
  # FastAPI Backend (REST API for AI agents)
  # Using file-based storage - works out of the box
  # =============================================================================
  api:
    container_name: socialseed-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000" # REST API
    environment:
      - TASKER_STORAGE_BACKEND=file
      - TASKER_FILE_PATH=/app/data
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - tasker-data:/app/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tasker-net

  # =============================================================================
  # Vue.js Frontend (Human UI - Kanban Board)
  # =============================================================================
  frontend:
    container_name: socialseed-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80" # Web UI
    depends_on:
      - api
    networks:
      - tasker-net

volumes:
  tasker-data:

networks:
  tasker-net:
    driver: bridge