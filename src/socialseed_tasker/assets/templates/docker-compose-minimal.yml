# =============================================================================
# Tasker Docker Compose (Minimal - API + Neo4j Only)
# =============================================================================
# For isolated testing: copy to your test directory and run:
#   docker compose -f docker-compose-minimal.yml up -d
#
# This version only starts Neo4j. Run the API locally:
#   pip install -e .
#   python -m socialseed_tasker.entrypoints.web_api

services:

  # =============================================================================
  # Neo4j Database (Graph Database - API + CLI Storage)
  # =============================================================================
  tasker-db:
    container_name: tasker-db
    image: neo4j:5.26.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neoSocial}
      - NEO4J_dbms_memory_heap_initial__size=100M
      - NEO4J_dbms_memory_heap_max__size=100M
      - NEO4J_dbms_memory_pagecache_size=50M
    volumes:
      - neo4j-data:/var/lib/neo4j/data
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1' | cypher-shell -u neo4j -p neoSocial || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
    networks:
      - tasker-net
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  tasker-net:
    driver: bridge

volumes:
  neo4j-data: