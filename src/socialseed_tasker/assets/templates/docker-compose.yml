services:
  neo4j:
    container_name: tasker-neo4j
    image: neo4j:5.26.15-community
    ports:
      - "7689:7689"
      - "7474:7474"
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/import:/import
      - ./neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=${TASKER_NEO4J_USER:-neo4j}/${TASKER_NEO4J_PASSWORD:-tasker_password}
      - NEO4J_server_http_listen__address=:7474
      - NEO4J_server_http_advertised__address=:7474
      - NEO4J_server_bolt_listen__address=:7689
      - NEO4J_server_bolt_advertised__address=:7689
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${TASKER_NEO4J_USER:-neo4j}", "-p", "${TASKER_NEO4J_PASSWORD:-tasker_password}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
