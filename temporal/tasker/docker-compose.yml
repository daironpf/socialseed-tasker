# =============================================================================
# Tasker Neo4j Docker Compose
# =============================================================================
# For external projects: copy to your project root and run:
#   docker compose up -d

services:
  neo4j:
    container_name: tasker-neo4j
    image: neo4j:5.26.15-community
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/neoSocial
      - NEO4J_server_http_listen__address=:7474
      - NEO4J_server_bolt_listen__address=:7687
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neoSocial 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins: