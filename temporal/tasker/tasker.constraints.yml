# =============================================================================
# Tasker Constraints Configuration
# =============================================================================
#
# This file defines architectural, technological, naming, pattern, and
# dependency rules for your project. Each constraint has an enforcement level:
#
#   - hard: Tasker blocks the action automatically at API/CLI write time
#   - soft: The agent must confirm compliance before closing the issue
#
# To activate a constraint, uncomment it and configure its settings.
# All constraints are commented out by default - activate only what you need.
#
# =============================================================================
# ARCHITECTURE CONSTRAINTS
# =============================================================================
# Define required architectural patterns for your project.
# Examples: hexagonal, clean, mvc, layered, microservices
#
# Uncomment and configure to enforce:
#
# architecture:
#   required:
#     - pattern: hexagonal
#       level: hard
#       description: "All services must follow hexagonal architecture"
#     - pattern: layered
#       level: soft
#       description: "Prefer layered architecture (presentation/domain/infrastructure)"
#   forbidden:
#     - pattern: spaghetti
#       level: hard
#       description: "Spaghetti code is not allowed"

# =============================================================================
# TECHNOLOGY CONSTRAINTS
# =============================================================================
# Define per-service technology rules and global forbidden technologies.
#
# Examples:
#   - auth-service must use PostgreSQL (not SQLite)
#   - forbidden: mongodb, sqlite (global ban)
#
# Uncomment and configure to enforce:
#
# technology:
#   required:
#     - service: auth-service
#       technology: postgresql
#       level: hard
#       description: "Auth service must use PostgreSQL for user data"
#     - service: "*"
#       technology: redis
#       level: soft
#       description: "All services should use Redis for caching"
#   forbidden:
#     - technology: sqlite
#       level: hard
#       description: "SQLite is forbidden - use PostgreSQL or MySQL"
#     - technology: mongodb
#       level: hard
#       description: "MongoDB is forbidden - use Neo4j or relational DBs"

# =============================================================================
# NAMING CONSTRAINTS
# =============================================================================
# Define field/class naming rules and convention enforcement.
#
# Examples:
#   - username cannot contain numbers
#   - DTOs must follow PascalCase
#   - Tables must be snake_case
#
# Uncomment and configure to enforce:
#
# naming:
#   fields:
#     - pattern: "^[a-z][a-z0-9_]*$"
#       level: hard
#       description: "Field names must be snake_case (e.g., user_name, not userName)"
#   classes:
#     - pattern: "^[A-Z][A-Za-z0-9]+$"
#       level: hard
#       description: "Class names must be PascalCase (e.g., UserService, not user_service)"
#   tables:
#     - pattern: "^[a-z][a-z0-9_]*$"
#       level: hard
#       description: "Database tables must be snake_case"
#   prefixes:
#     - prefix: "I"
#       target: interfaces
#       level: soft
#       description: "Interfaces should be prefixed with I (e.g., IUserRepository)"
#     - prefix: "DTO"
#       target: dtos
#       level: soft
#       description: "DTOs should be suffixed with DTO (e.g., UserDTO)"

# =============================================================================
# PATTERN CONSTRAINTS
# =============================================================================
# Define structural rules all services must follow.
#
# Examples:
#   - All services must expose /health endpoint
#   - DTOs must be separated from domain entities
#   - Every service needs a README
#
# Uncomment and configure to enforce:
#
# patterns:
#   required:
#     - pattern: health_endpoint
#       level: hard
#       description: "All services must expose /health endpoint"
#       path: /health
#     - pattern: dto_separation
#       level: hard
#       description: "DTOs must be in separate package from domain entities"
#       paths:
#         - "src/dto/"
#         - "src/domain/"
#     - pattern: readme
#       level: soft
#       description: "Every service must have a README.md"
#   forbidden:
#     - pattern: god_class
#       level: hard
#       description: "Classes with more than 500 lines are not allowed"

# =============================================================================
# DEPENDENCY CONSTRAINTS
# =============================================================================
# Define layer interaction rules and dependency depth limits.
#
# Examples:
#   - domain cannot import infrastructure
#   - max dependency depth: 4
#   - presentation cannot access data layer directly
#
# Uncomment and configure to enforce:
#
# dependencies:
#   layer_rules:
#     - from: domain
#       to: infrastructure
#       level: hard
#       description: "Domain layer cannot depend on infrastructure layer"
#     - from: application
#       to: presentation
#       level: hard
#       description: "Application layer cannot depend on presentation layer"
#   max_depth:
#     value: 4
#     level: hard
#     description: "Maximum dependency depth is 4 levels"
#   circular:
#     level: hard
#     description: "Circular dependencies are strictly forbidden"
#   forbidden_imports:
#     - from: domain
#       to: external_api_client
#       level: hard
#       description: "Domain cannot directly import external API clients"

# =============================================================================
# ENFORCEMENT NOTES
# =============================================================================
#
# Hard constraints:
#   - Block API/CLI writes automatically at write time
#   - Return structured error responses with constraint rule, level, and affected resource
#   - Examples: blocking issue creation, dependency addition, component update
#
# Soft constraints:
#   - Checked when an agent attempts to close an issue
#   - If violated, issue cannot be closed until agent confirms compliance
#   - Agent must document why constraint is not applicable or has been addressed
#
# To load constraints into Tasker:
#   - CLI: tasker constraints set
#   - API: POST /api/v1/constraints
#
# To list active constraints:
#   - CLI: tasker constraints list
#   - API: GET /api/v1/constraints
#
# To validate current project state:
#   - CLI: tasker constraints validate
#   - API: GET /api/v1/constraints/validate

# =============================================================================
# ACTIVE CONSTRAINTS (uncomment to enable)
# =============================================================================
#
# Copy constraints from sections above into this section to activate them.
# Format:
#
# active_constraints:
#   - category: architecture
#     pattern: hexagonal
#     level: hard
#     description: "All services must follow hexagonal architecture"
#
# Example (uncomment to activate):
#
# active_constraints: []
# Uncomment below and add constraints:
#   - category: architecture
#     pattern: hexagonal
#     level: hard
#     description: "All services must follow hexagonal architecture"